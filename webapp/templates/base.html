<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rwanda Health Media Scanning System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-content">
      <a href="{{ url_for('index') }}" class="brand">🏥 Rwanda Health Media Scanner</a>
      <nav class="topbar-nav">
        <a href="{{ url_for('index') }}" class="nav-link">Scans</a>
        <a href="{{ url_for('new_scan_form') }}" class="nav-link">Run Scan</a>
        <a href="{{ url_for('sources_status') }}" class="nav-link">Sources</a>
        <a href="{{ url_for('settings') }}" class="nav-link">Settings</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for message in messages %}<p>{{ message }}</p>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Rwanda Health Media Scanning System | Last updated: <span id="current-time"></span></p>
  </footer>

  <script>
    document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
  </script>
</body>
</html>
